<div class="home-container">
  <header>
    <h1>Pigloo Care</h1>
  </header>

  <app-penguin [state]="penguinState" [message]="penguinMessage"></app-penguin>

  <div class="cta-section">
    @if (!isCompletedToday) {
    <button class="btn-primary main-cta" routerLink="/journal">
      Commencer mon journal
    </button>
    }
  </div>

  <div class="daily-quote card">
    <p>"Je crois en toi, tu vas y arriver !"</p>
  </div>
</div>
