<div class="stats-container">
  <header>
    <h2>Mes Statistiques</h2>
    <mat-button-toggle-group [(ngModel)]="viewType" (ngModelChange)="renderCharts()" aria-label="View Type">
      <mat-button-toggle value="month">Mois</mat-button-toggle>
      <mat-button-toggle value="year">Année</mat-button-toggle>
    </mat-button-toggle-group>
  </header>

  <div class="stats-grid">
    <div class="card chart-card">
      <h3>Répartition des émotions</h3>
      <div class="pie-container">
        <canvas #moodChart></canvas>
      </div>
    </div>

    <div class="card chart-card">
      <h3>Fréquence des pleurs</h3>
      <div class="donut-container">
        <canvas #cryChart></canvas>
      </div>
    </div>

    <div class="card insights-card">
      <h3>Pigloo Insights 🐧</h3>
      <ul>
        @for (insight of insights; track insight) {
        <li>{{ insight }}</li>
        }
      </ul>
    </div>
  </div>
</div>
