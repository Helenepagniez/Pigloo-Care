<div class="penguin-container" [ngClass]="state">
  @if (message) {
  <div class="message-bubble">
    @if (!message.includes('Continue')) {
    <mat-icon>check_circle</mat-icon>
    }
    <span>{{ message }}</span>
  </div>
  }

  <div class="penguin-wrapper">
    <img [src]="imagePath + 'pigloo.png'" alt="Pigloo" class="penguin-img" />
    <div class="shadow"></div>
  </div>
</div>
